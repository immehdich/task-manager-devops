version: '3.8'
services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: taskdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - database
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
